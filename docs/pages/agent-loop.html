<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Loop · Unthinking</title>
    <meta
      name="description"
      content="An agent is a loop of context, orchestration, and execution. Each step has a known failure mode in the 360-paper Unthinking corpus."
    />
    <link rel="stylesheet" href="shared/base.css" />
    <script src="shared/theme.js"></script>
    <style>
      :root {
        --accent: var(--accent-blue);
        --accent-purple-bg: #a855f71a;
        --accent-orange-bg: #f973161a;
        --accent-green-bg: #22c55e1a;
        --accent-blue-bg: #60a5fa1a;
      }

      [data-theme="light"] {
        --accent-purple-bg: #f3e8ff;
        --accent-orange-bg: #fff7ed;
        --accent-green-bg: #dcfce7;
        --accent-blue-bg: #dbeafe;
      }

      .page {
        max-width: min(960px, 100%);
        margin: 0 auto;
        padding: 0 clamp(0.5rem, 2vw, 1rem);
      }

      h1 {
        text-align: center;
        font-family: "Space Grotesk", "Inter", sans-serif;
        font-weight: 700;
        font-size: clamp(1.5rem, 4vw, 1.9rem);
        background: linear-gradient(
          90deg,
          var(--accent-blue),
          var(--accent-purple-dim)
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 0.4rem;
      }

      .subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: clamp(0.75rem, 2vw, 0.95rem);
        line-height: 1.55;
        letter-spacing: 0.02em;
        margin: 0 auto 1.5rem;
        max-width: min(680px, 100%);
      }

      .subtitle code {
        background: transparent;
        padding: 0;
        color: var(--accent-blue);
        font-size: 0.95em;
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin: 0 auto 1rem;
      }

      .controls .toggle-wrap {
        display: inline-flex;
      }

      /* ════════════════════════════════════════════════════════════
         SVG diagram
         ════════════════════════════════════════════════════════════ */

      .diagram {
        background: var(--bg-secondary);
        border: 1px solid var(--border-primary);
        border-radius: 10px;
        padding: 0.6rem;
        margin: 0 auto 1.5rem;
      }

      .diagram svg {
        display: block;
        width: 100%;
        max-width: 920px;
        margin: 0 auto;
        cursor: pointer;
      }

      .step-label {
        text-align: center;
        font-family: "Courier New", monospace;
        font-size: clamp(0.75rem, 2vw, 0.9rem);
        min-height: 1.4rem;
        color: var(--text-muted);
        margin-bottom: 1.5rem;
        transition: color 0.4s;
      }

      /* ════════════════════════════════════════════════════════════
         Footer
         ════════════════════════════════════════════════════════════ */

      .credits {
        text-align: center;
        color: var(--text-muted);
        font-family: "Courier New", monospace;
        font-size: 0.7rem;
        padding: 1rem 0 0.5rem;
      }

      .credits a {
        color: var(--accent-blue);
        text-decoration: none;
      }
      .credits a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h2>Agent Loop</h2>
    </div>

    <div class="page">
      <h1>Agent is an LLM in a loop</h1>
      <p class="subtitle">
        LLM is <code>f(x) → y</code>. No memory, no agency. The devil is in
        software engineering — building a system to enable completion of
        tasks.
      </p>

      <p class="step-label" id="lbl">—</p>

      <div class="diagram">
        <svg
          id="svg"
          viewBox="0 0 920 540"
          preserveAspectRatio="xMidYMid meet"
        >
          <defs>
            <marker
              id="ah"
              markerWidth="8"
              markerHeight="8"
              refX="7"
              refY="3"
              orient="auto"
            >
              <path d="M0,0 L0,6 L8,3 z" fill="currentColor" />
            </marker>
            <marker
              id="ah-blue"
              markerWidth="8"
              markerHeight="8"
              refX="7"
              refY="3"
              orient="auto"
            >
              <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa" />
            </marker>
            <marker
              id="ah-white"
              markerWidth="8"
              markerHeight="8"
              refX="7"
              refY="3"
              orient="auto"
            >
              <path d="M0,0 L0,6 L8,3 z" fill="currentColor" />
            </marker>
            <marker
              id="ah-orange"
              markerWidth="8"
              markerHeight="8"
              refX="7"
              refY="3"
              orient="auto"
            >
              <path d="M0,0 L0,6 L8,3 z" fill="#f97316" />
            </marker>
            <marker
              id="ah-green"
              markerWidth="8"
              markerHeight="8"
              refX="7"
              refY="3"
              orient="auto"
            >
              <path d="M0,0 L0,6 L8,3 z" fill="#22c55e" />
            </marker>
          </defs>

          <!-- section backgrounds -->
          <rect x="0" y="0" width="268" height="540"
            fill="var(--accent-blue)" opacity="0.06" />
          <rect x="268" y="0" width="368" height="540"
            fill="var(--accent-purple-dim)" opacity="0.06" />
          <rect x="636" y="0" width="284" height="540"
            fill="var(--accent-orange)" opacity="0.06" />
          <line x1="268" y1="0" x2="268" y2="540"
            stroke="var(--border-primary)" stroke-width="1" />
          <line x1="636" y1="0" x2="636" y2="540"
            stroke="var(--border-primary)" stroke-width="1" />

          <!-- section header bars -->
          <rect id="sec-ctx" data-stage="ctx" x="0" y="0" width="268" height="30"
            fill="var(--bg-tertiary)" opacity="0.9" />
          <rect id="sec-orch" data-stage="orch" x="268" y="0" width="368" height="30"
            fill="var(--bg-tertiary)" opacity="0.9" />
          <rect id="sec-exec" data-stage="exec" x="636" y="0" width="284" height="30"
            fill="var(--bg-tertiary)" opacity="0.9" />
          <text x="134" y="20" text-anchor="middle"
            font-family="Courier New" font-size="10" font-weight="600"
            fill="var(--accent-blue)" letter-spacing="2">
            CONTEXT ENGINEERING
          </text>
          <text x="452" y="20" text-anchor="middle"
            font-family="Courier New" font-size="10" font-weight="600"
            fill="var(--accent-purple-dim)" letter-spacing="2">
            ORCHESTRATION
          </text>
          <text x="778" y="20" text-anchor="middle"
            font-family="Courier New" font-size="10" font-weight="600"
            fill="var(--accent-orange)" letter-spacing="2">
            EXECUTION
          </text>

          <!-- INPUT BOX -->
          <rect id="r-input" data-stage="ctx" x="18" y="55" width="228" height="80"
            rx="5" fill="var(--bg-primary)" stroke="var(--border-primary)"
            stroke-width="2" />
          <text x="32" y="75" font-family="Space Grotesk" font-size="12"
            font-weight="600" fill="var(--text-primary)">INPUT</text>
          <line x1="18" y1="82" x2="246" y2="82"
            stroke="var(--border-secondary)" stroke-width="1" />
          <text x="32" y="97" font-family="Courier New" font-size="11"
            fill="var(--text-muted)">system_message</text>
          <text x="32" y="113" font-family="Courier New" font-size="11"
            fill="var(--text-muted)">query</text>
          <line id="div-append" x1="18" y1="124" x2="246" y2="124"
            stroke="var(--border-primary)" stroke-width="1" opacity="0" />

          <!-- LLM BOX -->
          <rect id="r-llm" data-stage="llm" x="288" y="55" width="190" height="110"
            rx="5" fill="var(--bg-primary)" stroke="var(--accent-blue)"
            stroke-width="2" />
          <text x="304" y="75" font-family="Space Grotesk" font-size="12"
            font-weight="600" fill="var(--text-primary)">LLM</text>
          <line x1="288" y1="82" x2="478" y2="82"
            stroke="var(--border-secondary)" stroke-width="1" />
          <text x="304" y="97" font-family="Courier New" font-size="11"
            fill="var(--accent-blue)">f(x) → y</text>
          <text x="304" y="113" font-family="Courier New" font-size="11"
            fill="var(--text-muted)">stateless</text>
          <text x="304" y="129" font-family="Courier New" font-size="11"
            fill="var(--text-muted)">no memory</text>
          <text id="llm-out" x="304" y="152" font-family="Courier New"
            font-size="10" fill="var(--text-primary)" opacity="0">→</text>

          <!-- ORCHESTRATOR BOX -->
          <rect id="r-orch" data-stage="orch" x="288" y="240" width="190" height="90"
            rx="5" fill="var(--bg-primary)" stroke="var(--accent-purple-dim)"
            stroke-width="2" />
          <text x="304" y="260" font-family="Space Grotesk" font-size="12"
            font-weight="600" fill="var(--text-primary)">ORCHESTRATOR</text>
          <line x1="288" y1="267" x2="478" y2="267"
            stroke="var(--border-secondary)" stroke-width="1" />
          <text x="304" y="283" font-family="Courier New" font-size="11"
            fill="var(--accent-purple-dim)">routes output</text>
          <text id="orch-dec" x="304" y="303" font-family="Courier New"
            font-size="10" fill="var(--text-muted)">waiting…</text>
          <text id="orch-path" x="304" y="319" font-family="Courier New"
            font-size="10" fill="var(--text-muted)" opacity="0">→</text>

          <!-- EXECUTOR BOX -->
          <rect id="r-exec" data-stage="exec" x="656" y="170" width="228" height="100"
            rx="5" fill="var(--bg-primary)" stroke="var(--accent-orange)"
            stroke-width="2" />
          <text x="672" y="190" font-family="Space Grotesk" font-size="12"
            font-weight="600" fill="var(--text-primary)">EXECUTOR</text>
          <line x1="656" y1="197" x2="884" y2="197"
            stroke="var(--border-secondary)" stroke-width="1" />
          <text x="672" y="213" font-family="Courier New" font-size="11"
            fill="var(--accent-orange)">outside LLM</text>
          <text id="exec-cmd" x="672" y="231" font-family="Courier New"
            font-size="11" fill="var(--text-muted)">bash / api / fs</text>
          <text id="exec-note" x="672" y="247" font-family="Courier New"
            font-size="10" fill="var(--text-muted)">captures result</text>

          <!-- arrows -->
          <path id="a1"
            d="M 246 108 L 280 108"
            fill="none" stroke="var(--border-primary)" stroke-width="1.5"
            marker-end="url(#ah)" />
          <path id="a2"
            d="M 383 165 L 383 232"
            fill="none" stroke="var(--border-primary)" stroke-width="1.5"
            marker-end="url(#ah)" />
          <path id="a3"
            d="M 288 270 L 132 270 L 132 138"
            fill="none" stroke="var(--border-primary)" stroke-width="1.5"
            stroke-dasharray="5,3" marker-end="url(#ah)" />
          <path id="a4"
            d="M 478 278 L 640 278 L 640 228"
            fill="none" stroke="var(--border-primary)" stroke-width="1.5"
            marker-end="url(#ah)" />
          <path id="a5"
            d="M 770 270 L 770 450 L 132 450 L 132 140"
            fill="none" stroke="var(--border-primary)" stroke-width="1.5"
            marker-end="url(#ah)" />

          <!-- moving dot -->
          <circle id="dot" cx="0" cy="0" r="5" fill="var(--accent-blue)"
            opacity="0" />
        </svg>
      </div>

      <p class="credits">
        <a href="../index.html">Back to Unthinking</a> ·
        <a href="../galaxy/">Galaxy</a>
      </p>
    </div>

    <script>
      const STEP = 1800;
      const $ = (id) => document.getElementById(id);

      const BLUE = "#60a5fa";
      const WHITE = "var(--text-primary)";
      const PURPLE = "#a855f7";
      const ORANGE = "#f97316";
      const GREEN = "#22c55e";
      const DIM = "var(--border-primary)";

      const CYCLES = [
        {
          reason: "list files first",
          cmd: "ls -alh",
          result: "config.yaml  app.py  .env",
        },
        {
          reason: "found config.yaml, read it",
          cmd: "cat config.yaml",
          result: "db: prod  host: localhost",
        },
        {
          reason: "check if db is up",
          cmd: "curl localhost:5432",
          result: "Connection refused",
        },
        {
          reason: "db down, find process",
          cmd: "ps aux | grep db",
          result: "no process found",
        },
      ];

      const INPUT_TOP = 55;
      const BASE_HEIGHT = 80;
      const FIRST_ROW_Y = 139;
      const ROW_H = 15;

      let appendIdx = 0;
      let cycleIdx = 0;
      let stepIdx = 0;
      let paused = false;
      let timer = null;
      let appendedNodes = [];

      function glow(id, color, strokeOverride) {
        const r = $(id);
        if (!r) return;
        r.style.stroke = strokeOverride || color;
        r.style.strokeWidth = "2.5";
        r.style.filter = `drop-shadow(0 0 14px ${color})`;
      }
      function unglow(id, stroke) {
        const r = $(id);
        if (!r) return;
        r.style.stroke = stroke || DIM;
        r.style.strokeWidth = "2";
        r.style.filter = "none";
      }
      function secGlow(id, color) {
        const r = $(id);
        if (!r) return;
        r.style.fill = color;
        r.style.opacity = "0.18";
      }
      function secDim(id) {
        const r = $(id);
        if (!r) return;
        r.style.fill = "var(--bg-tertiary)";
        r.style.opacity = "0.9";
      }

      function arrow(id, color, mk) {
        const a = $(id);
        if (!a) return;
        a.style.stroke = color;
        a.style.opacity = "1";
        a.style.strokeWidth = "2";
        a.setAttribute("marker-end", `url(#ah-${mk})`);
      }
      function dimA(id) {
        const a = $(id);
        if (!a) return;
        a.style.stroke = "var(--border-primary)";
        a.style.opacity = "0.45";
        a.style.strokeWidth = "1.5";
        a.setAttribute("marker-end", "url(#ah)");
      }
      function dot(cx, cy, color) {
        const d = $("dot");
        d.setAttribute("cx", cx);
        d.setAttribute("cy", cy);
        d.style.fill = color;
        d.style.opacity = "1";
      }
      function hideDot() {
        $("dot").style.opacity = "0";
      }
      function show(id) {
        $(id).style.opacity = "1";
        $(id).style.transition = "opacity 0.4s";
      }
      function hide(id) {
        $(id).style.opacity = "0";
      }
      function label(txt, color) {
        $("lbl").textContent = txt;
        $("lbl").style.color = color || "var(--text-muted)";
      }

      // INPUT grows forever — but the SVG viewbox is fixed at 540 high.
      // Keep at most MAX_ROWS visible. When we exceed it, fade the oldest
      // row out and shift the remaining ones up so the newest always
      // lands at the bottom of the box.
      const MAX_ROWS = 18;

      function relayoutRows() {
        const visibleCount = appendedNodes.length;
        const newH = BASE_HEIGHT + 15 + visibleCount * ROW_H;
        $("r-input").setAttribute("height", newH);
        $("div-append").style.opacity = visibleCount > 0 ? "0.5" : "0";
        const newBottom = INPUT_TOP + newH;
        $("a3").setAttribute(
          "d",
          `M 288 270 L 132 270 L 132 ${newBottom - 6}`,
        );
        $("a5").setAttribute(
          "d",
          `M 770 270 L 770 450 L 132 450 L 132 ${newBottom - 6}`,
        );
        appendedNodes.forEach((node, idx) => {
          node.setAttribute("y", FIRST_ROW_Y + idx * ROW_H);
        });
      }

      function appendRow(text, color) {
        const svg = $("svg");
        const t = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "text",
        );
        t.setAttribute("x", "32");
        t.setAttribute("font-family", "Courier New");
        t.setAttribute("font-size", "10");
        t.setAttribute("fill", color);
        t.textContent = text;
        t.style.opacity = "0";
        t.style.transition = "opacity 0.5s";
        svg.appendChild(t);
        appendedNodes.push(t);

        // Drop the oldest row(s) if we've exceeded the visible budget so
        // the input box doesn't overrun the orchestrator/executor below.
        while (appendedNodes.length > MAX_ROWS) {
          const old = appendedNodes.shift();
          old.style.opacity = "0";
          setTimeout(() => old.remove(), 400);
        }

        relayoutRows();
        requestAnimationFrame(() => (t.style.opacity = "1"));
        appendIdx++;
      }

      function resetBoxes() {
        ["a1", "a2", "a3", "a4", "a5"].forEach(dimA);
        ["sec-ctx", "sec-orch", "sec-exec"].forEach(secDim);
        unglow("r-input", "var(--border-primary)");
        unglow("r-llm", "var(--accent-blue)");
        unglow("r-orch", "var(--accent-purple-dim)");
        unglow("r-exec", "var(--accent-orange)");
        hide("llm-out");
        $("orch-dec").textContent = "waiting…";
        $("orch-dec").style.fill = "var(--text-muted)";
        hide("orch-path");
        $("exec-cmd").textContent = "bash / api / fs";
        $("exec-cmd").style.fill = "var(--text-muted)";
        $("exec-note").textContent = "captures result";
        hideDot();
      }

      function buildSteps(cycle) {
        return [
          () => {
            resetBoxes();
            glow("r-input", BLUE, "var(--accent-blue)");
            secGlow("sec-ctx", BLUE);
            label("Context ready — INPUT enters the loop", BLUE);
            dot(132, 108, BLUE);
          },
          () => {
            unglow("r-input", "var(--border-primary)");
            secDim("sec-ctx");
            arrow("a1", BLUE, "blue");
            secGlow("sec-orch", PURPLE);
            label("INPUT passed to LLM", BLUE);
            dot(280, 108, BLUE);
          },
          () => {
            glow("r-llm", BLUE, "var(--accent-blue)");
            const o = $("llm-out");
            o.textContent = `→ ${cycle.reason}`;
            o.style.fill = "var(--text-primary)";
            show("llm-out");
            label("LLM reasons — no tool call yet", "var(--text-primary)");
            dot(383, 108, BLUE);
          },
          () => {
            unglow("r-llm", "var(--accent-blue)");
            arrow("a2", "var(--text-secondary)", "white");
            label(
              "Reasoning passed to Orchestrator",
              "var(--text-secondary)",
            );
            dot(383, 232, BLUE);
          },
          () => {
            glow("r-orch", PURPLE, "var(--accent-purple-dim)");
            $("orch-dec").textContent = "no tool call";
            $("orch-dec").style.fill = "var(--text-primary)";
            const p = $("orch-path");
            p.textContent = "→ append to context";
            p.style.fill = "var(--text-primary)";
            show("orch-path");
            label(
              "Orchestrator: reasoning only — back to context",
              PURPLE,
            );
            dot(288, 270, BLUE);
          },
          () => {
            unglow("r-orch", "var(--accent-purple-dim)");
            arrow("a3", "var(--text-secondary)", "white");
            secGlow("sec-ctx", BLUE);
            label("Reasoning appended to context", "var(--text-secondary)");
            dot(132, 200, BLUE);
          },
          () => {
            appendRow(`reasoning: ${cycle.reason}`, "var(--text-primary)");
            glow("r-input", BLUE, "var(--accent-blue)");
            label("Context grows — loop again with reasoning", BLUE);
            hideDot();
          },
          () => {
            unglow("r-input", "var(--border-primary)");
            secDim("sec-ctx");
            arrow("a1", BLUE, "blue");
            secGlow("sec-orch", PURPLE);
            label("Larger INPUT enters LLM", BLUE);
            dot(280, 108, BLUE);
          },
          () => {
            glow("r-llm", BLUE, "var(--accent-blue)");
            const o = $("llm-out");
            o.textContent = `→ ${cycle.cmd}`;
            o.style.fill = ORANGE;
            show("llm-out");
            label("LLM outputs tool call", ORANGE);
            dot(383, 108, ORANGE);
          },
          () => {
            unglow("r-llm", "var(--accent-blue)");
            arrow("a2", ORANGE, "orange");
            label("Tool call passed to Orchestrator", ORANGE);
            dot(383, 232, ORANGE);
          },
          () => {
            glow("r-orch", PURPLE, "var(--accent-purple-dim)");
            $("orch-dec").textContent = "tool call!";
            $("orch-dec").style.fill = ORANGE;
            const p = $("orch-path");
            p.textContent = "→ route to Executor";
            p.style.fill = ORANGE;
            show("orch-path");
            label("Orchestrator: tool call — route to Executor", PURPLE);
            dot(478, 278, ORANGE);
          },
          () => {
            unglow("r-orch", "var(--accent-purple-dim)");
            arrow("a4", ORANGE, "orange");
            secGlow("sec-exec", ORANGE);
            label("Tool call handed to Executor", ORANGE);
            dot(640, 228, ORANGE);
          },
          () => {
            glow("r-exec", ORANGE, "var(--accent-orange)");
            $("exec-cmd").textContent = cycle.cmd;
            $("exec-cmd").style.fill = ORANGE;
            $("exec-note").textContent = "running outside LLM…";
            label("Executor runs — outside LLM", ORANGE);
            dot(770, 220, ORANGE);
          },
          () => {
            unglow("r-exec", "var(--accent-orange)");
            arrow("a5", GREEN, "green");
            secDim("sec-exec");
            secGlow("sec-ctx", BLUE);
            label(`Result: "${cycle.result}" → back to context`, GREEN);
            dot(132, 380, GREEN);
          },
          () => {
            appendRow(`result: ${cycle.result}`, GREEN);
            glow("r-input", BLUE, "var(--accent-blue)");
            label("Context grows — ready for next cycle", BLUE);
            hideDot();
            cycleIdx = (cycleIdx + 1) % CYCLES.length;
          },
        ];
      }

      let steps = buildSteps(CYCLES[cycleIdx]);

      function tick() {
        if (paused) return;
        if (stepIdx === 0) steps = buildSteps(CYCLES[cycleIdx]);
        steps[stepIdx]();
        stepIdx = (stepIdx + 1) % steps.length;
      }

      function startTimer() {
        if (timer) clearInterval(timer);
        timer = setInterval(tick, STEP);
      }

      const svgEl = document.getElementById("svg");
      svgEl.addEventListener("mouseenter", () => {
        paused = true;
      });
      svgEl.addEventListener("mouseleave", () => {
        paused = false;
      });

      tick();
      startTimer();
    </script>
  </body>
</html>
