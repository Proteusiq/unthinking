<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <link rel="apple-touch-icon" href="./logo.svg" />
    <title>Unthinking - the case against LLM reasoning</title>
    <meta
      name="description"
      content="375 papers. 36 smoking guns. One story. The literature converges: what we call reasoning in LLMs is predictive completion."
    />
    <meta name="theme-color" content="#08080b" />
    <meta
      name="og:title"
      content="Unthinking - the case against LLM reasoning"
    />
    <meta
      name="og:description"
      content="375 papers, projected in 3D semantic space. Runs entirely in your browser via EmbeddingGemma + WebGPU."
    />
    <script>
      // Resolve theme before first paint so we don't flash the wrong palette.
      (function () {
        try {
          var stored = localStorage.getItem("unthinking.theme");
          var choice =
            stored === "light" || stored === "dark" || stored === "auto"
              ? stored
              : "auto";
          var resolved = choice;
          if (choice === "auto") {
            resolved =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark";
          }
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta)
            meta.setAttribute(
              "content",
              resolved === "light" ? "#f5f6fb" : "#08080b",
            );
        } catch (_e) {
          // localStorage unavailable; do nothing - default styles will apply.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
