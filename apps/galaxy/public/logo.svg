<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Unthinking mark: three weighted dots = corpus stance distribution.
       Green dominant (supports), gray (balanced), red (challenges).
       The lone red dot also reads as the dot of an "i" in "unthinking". -->
  <circle cx="20" cy="36" r="14" fill="#4ade80" />
  <circle cx="42" cy="28" r="8" fill="#cbd5e1" />
  <circle cx="50" cy="48" r="4" fill="#f87171" />
</svg>
