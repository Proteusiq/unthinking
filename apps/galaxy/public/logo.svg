<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Unthinking mark: three weighted stars connected = a small
       constellation. Sizes mirror the corpus stance distribution
       (supports dominant, balanced secondary, challenges minority).
       The connecting line says "these speak to each other" — the
       project IS the corpus interaction graph. -->
  <g stroke="#475569" stroke-width="0.8" stroke-linecap="round" opacity="0.55">
    <line x1="20" y1="36" x2="42" y2="28" />
    <line x1="42" y1="28" x2="50" y2="48" />
  </g>
  <circle cx="20" cy="36" r="13" fill="#4ade80" />
  <circle cx="42" cy="28" r="7.5" fill="#e2e8f0" />
  <circle cx="50" cy="48" r="3.5" fill="#f87171" />
</svg>
